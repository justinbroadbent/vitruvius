apiVersion: vitruvius.io/v1
kind: ConformanceProfile
metadata:
  name: regulated-workload
  version: v1
  description: What an internal, regulated workload (handling member NPI) must satisfy before its change merges (ADR 0025) — both completeness (required capabilities present, forbidden ones absent) and correctness (safe properties on what is present). Each rule cites the compliance control it supports (ADR 0021).

# Rule kinds:
#   require_resource  — at least `minimum` of these types must be planned (completeness).
#   forbid_resource   — none of these types may be planned.
#   assert_property   — present resources of these types must satisfy the property;
#                       a missing/unknown value FAILS CLOSED unless on_missing: skip.
# require_resource names only what this root must create itself; a capability the
# workload consumes from another root is out of a single plan's view (ADR 0025).
spec:
  rules:
    # Root-local: this requires a federated identity CREATED IN THIS ROOT. A
    # workload that instead consumes a platform-provided identity (passed in by
    # ID) is a different shape and would use a future profile
    # (regulated-workload-shared-identity/v1) — a single plan cannot see a
    # capability created in another root (ADR 0025; the provides/requires graph
    # is deferred).
    - id: identity.workload-federation-required
      kind: require_resource
      resource_types: [azurerm_federated_identity_credential]
      minimum: 1
      cites: [csf:PR.AC-1]

    - id: identity.no-static-secret
      kind: forbid_resource
      resource_types: [azuread_application_password, azuread_service_principal_password]
      cites: [csf:PR.AC-1]

    - id: keyvault.no-public-access
      kind: assert_property
      resource_types: [azurerm_key_vault]
      field: public_network_access_enabled
      equals: false
      on_missing: fail
      cites: [csf:PR.DS-5]

    - id: appservice.no-public-access
      kind: assert_property
      resource_types: [azurerm_linux_web_app, azurerm_windows_web_app]
      field: public_network_access_enabled
      equals: false
      on_missing: fail
      cites: [csf:PR.DS-5]

    - id: appservice.https-only
      kind: assert_property
      resource_types: [azurerm_linux_web_app, azurerm_windows_web_app]
      field: https_only
      equals: true
      on_missing: fail
      cites: [csf:PR.DS-2]

    - id: storage.no-public-blob
      kind: assert_property
      resource_types: [azurerm_storage_account]
      field: allow_nested_items_to_be_public
      equals: false
      on_missing: fail
      cites: [csf:PR.DS-5]

    - id: location.approved-regions
      kind: assert_property
      resource_types: ["*"]
      field: location
      in: [eastus, eastus2]
      on_missing: skip
      cites: []

    # §5: the plan must not contradict the descriptor's classification. The
    # resource group (the tag source) carries the exact values; storage holding
    # member data must carry them directly (inheritance not acceptable for it);
    # any resource that explicitly tags otherwise is a contradiction. Resources
    # that simply omit the tags are fine — Azure Policy inherits them from the RG.
    - id: tags.match-descriptor
      kind: tags_match_descriptor
      resource_group_types: [azurerm_resource_group]
      direct_tag_required: [azurerm_storage_account]
      cites: [csf:PR.DS-1]
