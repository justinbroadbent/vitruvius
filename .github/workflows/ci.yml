name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  TF_VERSION: 1.9.8

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform fmt -check -recursive

  module:
    name: module — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/foundation/naming
          - modules/foundation/tags
          - modules/foundation/diagnostic-settings
          - modules/foundation/identity
          - modules/platform-services/observability-substrate
          - modules/workload-patterns/web-api-aks
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform test

  example:
    name: example — ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - modules/foundation/naming/examples/minimal
          - modules/foundation/naming/examples/full
          - modules/foundation/tags/examples/minimal
          - modules/foundation/tags/examples/full
          - modules/foundation/diagnostic-settings/examples/minimal
          - modules/foundation/diagnostic-settings/examples/full
          - modules/foundation/identity/examples/minimal
          - modules/platform-services/observability-substrate/examples/minimal
          - modules/platform-services/observability-substrate/examples/full
          - modules/workload-patterns/web-api-aks/examples/minimal
          - modules/workload-patterns/web-api-aks/examples/full
          - examples/reference-landingzone
    defaults:
      run:
        working-directory: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform init -backend=false
      - run: terraform validate

  adr-index:
    name: ADR index up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate ADR index
        shell: pwsh
        run: ./scripts/generate-adr-index.ps1
      - name: Verify no diff
        run: |
          if ! git diff --quiet docs/decisions/README.md; then
            echo "::error::ADR index is out of date. Run scripts/generate-adr-index.ps1 locally and commit the result."
            git diff docs/decisions/README.md
            exit 1
          fi

  all:
    name: All checks
    runs-on: ubuntu-latest
    needs: [fmt, module, example, adr-index]
    if: always()
    steps:
      - name: Verify all dependent jobs succeeded
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" \
             || "${{ needs.module.result }}" != "success" \
             || "${{ needs.example.result }}" != "success" \
             || "${{ needs.adr-index.result }}" != "success" ]]; then
            echo "::error::One or more required checks did not succeed"
            exit 1
          fi
