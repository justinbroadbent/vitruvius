name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: 1.9.8

jobs:
  # Modules and examples are discovered from the filesystem so a new module
  # cannot merge without CI coverage — a hand-maintained matrix silently
  # skips anything nobody remembered to add.
  discover:
    name: discover modules & examples
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          modules=$(find modules -mindepth 3 -maxdepth 3 -name manifest.yaml -printf '%h\n' | sort | jq -R -s -c 'split("\n")[:-1]')
          {
            find modules -mindepth 4 -maxdepth 4 -type d -path '*/examples/*' | sort
            for d in examples/*/; do
              [ -f "$d/main.tf" ] && echo "${d%/}"
            done
          } > /tmp/examples.txt
          examples=$(jq -R -s -c 'split("\n")[:-1]' < /tmp/examples.txt)
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $modules"
          echo "Discovered examples: $examples"

  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform fmt -check -recursive

  manifest:
    name: manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml jsonschema
      - run: python scripts/validate-manifests.py
      - name: Regenerate catalog-info.yaml from manifests
        run: python scripts/generate-catalog-info.py
      - name: Verify catalog files match manifests
        run: |
          if ! git diff --quiet -- 'modules/*/*/catalog-info.yaml'; then
            echo "::error::catalog-info.yaml drift. Run scripts/generate-catalog-info.py locally and commit the result."
            git diff -- 'modules/*/*/catalog-info.yaml'
            exit 1
          fi
      - name: Regenerate control map from declared mappings
        run: python scripts/generate-control-map.py
      - name: Verify control map matches mappings
        run: |
          if ! git diff --quiet -- policies/ncua-glba/CONTROL-MAP.md; then
            echo "::error::CONTROL-MAP.md drift. Run scripts/generate-control-map.py locally and commit the result."
            git diff -- policies/ncua-glba/CONTROL-MAP.md
            exit 1
          fi
      - name: Regenerate implementation-status report
        run: python scripts/generate-implementation-status.py
      - name: Verify implementation status matches source
        run: |
          if ! git diff --quiet -- docs/IMPLEMENTATION-STATUS.md; then
            echo "::error::IMPLEMENTATION-STATUS.md drift. Run scripts/generate-implementation-status.py locally and commit the result."
            git diff -- docs/IMPLEMENTATION-STATUS.md
            exit 1
          fi

  module:
    name: module — ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform test

  example:
    name: example — ${{ matrix.example }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    defaults:
      run:
        working-directory: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - run: terraform init -backend=false
      - run: terraform validate

  adr-index:
    name: ADR index up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate ADR index
        shell: pwsh
        run: ./scripts/generate-adr-index.ps1
      - name: Verify no diff
        run: |
          if ! git diff --quiet docs/decisions/README.md; then
            echo "::error::ADR index is out of date. Run scripts/generate-adr-index.ps1 locally and commit the result."
            git diff docs/decisions/README.md
            exit 1
          fi

  all:
    name: All checks
    runs-on: ubuntu-latest
    needs: [fmt, manifest, module, example, adr-index]
    if: always()
    steps:
      - name: Verify all dependent jobs succeeded
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" \
             || "${{ needs.manifest.result }}" != "success" \
             || "${{ needs.module.result }}" != "success" \
             || "${{ needs.example.result }}" != "success" \
             || "${{ needs.adr-index.result }}" != "success" ]]; then
            echo "::error::One or more required checks did not succeed"
            exit 1
          fi
