# Authored source for the implementation-status report — the "decided vs built
# vs effective" line, as data rather than scattered prose. docs/IMPLEMENTATION-
# STATUS.md is GENERATED from this file by scripts/generate-implementation-
# status.py and drift-checked in CI. Never edit the report by hand.
#
# Every accepted ADR (docs/decisions/NNNN-*.md with status: accepted) must have
# an entry here, or CI fails — a new decision cannot silently dodge the report.
#
# status vocabulary (controlled):
#   implemented — the decision's mechanisms are built in this repo and exercised in CI or the examples.
#   partial     — some mechanisms are built; the rest are named under `planned`.
#   decided     — accepted as a contract; no implementation lives in this repo yet (adopter- or future-side).
#   proposed    — still an open RFC, not yet accepted.
#
# `built` / `planned` are short, honest phrases. `tracking` lists open issue
# numbers where a planned item has one.

