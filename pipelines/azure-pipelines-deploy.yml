# Reference ADR 0020 deployment pipeline (Azure DevOps).
#
# The control logic lives in scripts/pipeline.py and scripts/evaluate-conformance.py
# and is vendor-independent — only this orchestration is Azure DevOps. A different
# CD vendor maps the same steps (plan -> gate -> bundle -> approve -> verify -> apply
# -> receipt) onto its own primitives.
#
# This is the *reference design*. Running it needs an Azure DevOps org, an
# OIDC/workload-identity service connection (no stored secret — ADR 0009), and an
# Environment whose "Approvals and checks" require an approver who is not the author
# (ADR 0007). This repo's CI (GitHub Actions) does not execute it; CI runs
# scripts/pipeline.py --self-test. See docs/IMPLEMENTATION-STATUS.md.
#
# Guarantee: one saved plan, one normal-path apply invocation, and no re-plan
# between gate and apply. A Terraform plan is bound to one state + input set, so a
# multi-environment estate runs this pipeline once per environment, each gating on
# its own inputs. Verdict inputs are hashed at the gate and re-verified before apply.

parameters:
  - name: root          # the deployable unit: a repo path with main.tf and vitruvius.yaml
    type: string
  - name: environment   # dev | staging | prod — an Environment with a non-author approver
    type: string

variables:
  TF_ROOT: ${{ parameters.root }}
  SERVICE_CONNECTION: vitruvius-oidc   # workload-identity federation; no stored credential

stages:
  - stage: plan
    displayName: Plan, gate, and bundle
    jobs:
      - job: plan_and_gate
        steps:
          - checkout: self
          - bash: |
              set -euo pipefail
              # Canonicalize BEFORE any Terraform: an absolute/traversing/outside-repo
              # unit is rejected here, so Terraform never runs in the wrong place.
              CANON="$(python scripts/pipeline.py canonical-unit --unit "$(TF_ROOT)")"
              echo "##vso[task.setvariable variable=CANONICAL_UNIT]$CANON"
              echo "canonical deployable unit: $CANON"
            displayName: Preflight — canonicalize the deployable unit (before any Terraform)
          - task: AzureCLI@2
            displayName: terraform plan -out=tfplan ; show -json
            inputs:
              azureSubscription: $(SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd "$(CANONICAL_UNIT)"
                test -f .terraform.lock.hcl || { echo "##vso[task.logissue type=error]no committed .terraform.lock.hcl in $(CANONICAL_UNIT)"; exit 1; }
                terraform init -lockfile=readonly        # provider selection is pinned by the committed lockfile
                terraform plan -out=tfplan
                terraform show -json tfplan > tfplan.json
          - script: |
              set -euo pipefail
              python scripts/pipeline.py gate \
                --root "$(CANONICAL_UNIT)" \
                --repository "$(Build.Repository.Name)" \
                --commit "$(Build.SourceVersion)" \
                --environment "${{ parameters.environment }}" \
                --unit "$(CANONICAL_UNIT)" \
                --out "$(CANONICAL_UNIT)/plan-manifest.json"
            displayName: Conformance gate (fails here, before any approval)
          - script: |
              set -euo pipefail
              python scripts/pipeline.py bundle \
                --root "$(CANONICAL_UNIT)" \
                --out "$(Build.ArtifactStagingDirectory)/bundle"
            displayName: Stage the sensitive artifact bundle (only the required files)
          - publish: $(Build.ArtifactStagingDirectory)/bundle
            artifact: plan-${{ parameters.environment }}
            # Immutable: tfplan (binary), tfplan.json, vitruvius.yaml, plan-manifest.json.
            # Both plans may contain sensitive values — see pipelines/README.md.

  - stage: apply
    displayName: Approve, verify, apply, receipt
    dependsOn: plan
    jobs:
      - deployment: apply
        environment: ${{ parameters.environment }}   # non-author approver gates this job (ADR 0007)
        variables:
          verifyResult: failed        # defaults so the always() receipt has values even if a step is skipped
          applyAttempted: 'false'
          applyResult: not_attempted
          applyExitCode: '-1'
          CANONICAL_UNIT: ''                      # set by preflight; default keeps the always() receipt populated
          ACTUAL_COMMIT: $(Build.SourceVersion)   # replaced by the real HEAD in preflight
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self        # deployment jobs do not check out by default; pipeline.py needs the evaluator/schema/profiles/registry
                - download: current
                  artifact: plan-${{ parameters.environment }}
                - bash: |
                    set +e
                    # Canonicalize the unit and pin the actual commit BEFORE any Terraform.
                    CANON="$(python scripts/pipeline.py canonical-unit --unit "$(TF_ROOT)")"
                    if [ $? -ne 0 ]; then
                      echo "##vso[task.logissue type=error]invalid deployable unit: $(TF_ROOT)"
                      echo "##vso[task.setvariable variable=verifyResult]failed"; exit 1
                    fi
                    echo "##vso[task.setvariable variable=CANONICAL_UNIT]$CANON"
                    ACTUAL=$(git rev-parse HEAD)      # the commit actually checked out, not just the requested one
                    echo "##vso[task.setvariable variable=ACTUAL_COMMIT]$ACTUAL"
                    if [ "$ACTUAL" != "$(Build.SourceVersion)" ]; then
                      echo "##vso[task.logissue type=error]checked-out $ACTUAL != requested $(Build.SourceVersion)"
                      echo "##vso[task.setvariable variable=verifyResult]failed"; exit 1
                    fi
                  displayName: Preflight — canonicalize the unit and check the actual commit (before any Terraform)
                - bash: |
                    set +e
                    R="$(Pipeline.Workspace)/plan-${{ parameters.environment }}"
                    python scripts/pipeline.py verify \
                      --root "$R" --manifest "$R/plan-manifest.json" \
                      --repository "$(Build.Repository.Name)" \
                      --commit "$(ACTUAL_COMMIT)" \
                      --environment "${{ parameters.environment }}" \
                      --unit "$(CANONICAL_UNIT)"
                    RC=$?
                    [ $RC -eq 0 ] && echo "##vso[task.setvariable variable=verifyResult]success" || echo "##vso[task.setvariable variable=verifyResult]failed"
                    exit $RC          # fail the job on drift; the variable is already set for the receipt
                  displayName: Verify verdict inputs (fail closed; git-anchored descriptor/profile, hashes, exemptions)
                - task: AzureCLI@2
                  displayName: terraform apply tfplan (exact saved plan; lockfile readonly; no re-plan)
                  condition: succeeded()
                  inputs:
                    azureSubscription: $(SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set +e
                      R="$(Pipeline.Workspace)/plan-${{ parameters.environment }}"
                      cp "$R/tfplan" "$(CANONICAL_UNIT)/tfplan"      # the verified saved plan, into the checked-out unit
                      cd "$(CANONICAL_UNIT)"
                      terraform init -lockfile=readonly        # provider selection cannot silently change
                      terraform apply tfplan
                      RC=$?
                      echo "##vso[task.setvariable variable=applyAttempted]true"
                      echo "##vso[task.setvariable variable=applyExitCode]$RC"
                      [ $RC -eq 0 ] && echo "##vso[task.setvariable variable=applyResult]success" || echo "##vso[task.setvariable variable=applyResult]failed"
                      exit $RC
                - bash: |
                    set -euo pipefail
                    R="$(Pipeline.Workspace)/plan-${{ parameters.environment }}"
                    # APPROVER is org-wired from the Environment approval — see pipelines/README.md "Security limitations".
                    # Runtime identity is passed explicitly so a receipt is still emitted if the manifest is unreadable.
                    python scripts/pipeline.py receipt \
                      --manifest "$R/plan-manifest.json" \
                      --approver "$(APPROVER)" \
                      --verify-result "$(verifyResult)" \
                      --apply-attempted "$(applyAttempted)" \
                      --apply-result "$(applyResult)" \
                      --apply-exit-code "$(applyExitCode)" \
                      --pipeline-result "$(Agent.JobStatus)" \
                      --completed-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                      --repository "$(Build.Repository.Name)" \
                      --commit "$(ACTUAL_COMMIT)" \
                      --environment "${{ parameters.environment }}" \
                      --unit "$(CANONICAL_UNIT)" \
                      --out "$R/deployment-receipt.json"
                  displayName: Deployment receipt (every handled verify/apply outcome once checkout + bundle are available)
                  condition: always()
                - publish: $(Pipeline.Workspace)/plan-${{ parameters.environment }}/deployment-receipt.json
                  artifact: receipt-${{ parameters.environment }}
                  condition: always()
